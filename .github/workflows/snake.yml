name: Generate Snake 🐍

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-dark
            dist/github-snake-dark.svg?palette=github-dark

      - name: Fix Snake CSS Colors
        run: |
          for f in dist/github-snake.svg dist/github-snake-dark.svg; do
            if [ -f "$f" ]; then
              echo "=== Before fix ==="
              grep -o '\-\-cs:[^;]*' "$f" || true
              # Fix: --cs is set WITHOUT '#' prefix by snk → makes snake black
              # Replace whatever invalid value --cs has → valid purple hex
              sed -i 's/--cs:[^;"}]*/--cs:#A78BFA/g' "$f"
              # Make empty squares dark purple instead of near-black
              sed -i 's/--ce:#161b22/--ce:#1e1040/g' "$f"
              sed -i 's/--c0:#161b22/--c0:#1e1040/g' "$f"
              echo "=== After fix ==="
              grep -o '\-\-cs:[^;]*' "$f" || true
            fi
          done

      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
