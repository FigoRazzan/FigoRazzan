name: Generate Snake 🐍

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=39FF14&color_dots[0]=0d1117&color_dots[1]=003d00&color_dots[2]=006400&color_dots[3]=00a800&color_dots[4]=39FF14&color_bg=0d1117
            dist/github-snake-dark.svg?color_snake=00FF88&color_dots[0]=0d1117&color_dots[1]=003820&color_dots[2]=005c2e&color_dots[3]=00a550&color_dots[4]=00FF88&color_bg=0d1117

      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
