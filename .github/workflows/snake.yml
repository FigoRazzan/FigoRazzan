name: Generate Snake 🐍

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=A78BFA
            dist/github-snake-dark.svg?palette=github-dark&color_snake=A78BFA

      - name: Tune Snake SVG Colors
        run: |
          for f in dist/github-snake.svg dist/github-snake-dark.svg; do
            if [ -f "$f" ]; then
              # Replace near-black empty squares → visible dark purple
              sed -i 's/fill="#161b22"/fill="#2d1b4e"/g' "$f"
              sed -i 's/fill="#0d1117"/fill="#1a0533"/g' "$f"
            fi
          done

      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
