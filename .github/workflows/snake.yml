name: Generate Snake 🐍

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-dark
            dist/github-snake-dark.svg?palette=github-dark

      - name: Fix Snake CSS Colors
        run: |
          SNAKE_COLOR='A78BFA'
          EMPTY_COLOR='1e1040'
          for f in dist/github-snake.svg dist/github-snake-dark.svg; do
            if [ -f "$f" ]; then
              echo "Before: $(grep -o 'cs:[^;]*' $f || echo 'not found')"
              awk -v sc="$SNAKE_COLOR" '{
                gsub(/--cs:[^;]*/, "--cs:#" sc)
                gsub(/--ce:[^;]*/, "--ce:#060b14")
                gsub(/--c0:[^;]*/, "--c0:#060b14")
                gsub(/--c1:[^;]*/, "--c1:#3b0764")
                gsub(/--c2:[^;]*/, "--c2:#6b21a8")
                gsub(/--c3:[^;]*/, "--c3:#9333ea")
                gsub(/--c4:[^;]*/, "--c4:#c084fc")
                print
              }' "$f" > "${f}.tmp" && mv "${f}.tmp" "$f"
              echo "After: $(grep -o 'cs:[^;]*' $f || echo 'not found')"
            fi
          done

      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
