name: Generate Snake 🐍

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=A78BFA&color_dots[]=0d1117&color_dots[]=1e1b4b&color_dots[]=4c1d95&color_dots[]=7c3aed&color_dots[]=a78bfa&color_bg=0d1117
            dist/github-snake-dark.svg?color_snake=F472B6&color_dots[]=0d1117&color_dots[]=1e1b4b&color_dots[]=6d28d9&color_dots[]=8b5cf6&color_dots[]=c4b5fd&color_bg=0d1117

      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
